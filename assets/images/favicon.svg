<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BIO-Imkerei Moser Biene">
  <!-- Hintergrund: Honigwabe (abgerundetes Quadrat) -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#f2a900"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#glanz)"/>

  <!-- Flügel -->
  <ellipse cx="20" cy="24" rx="9" ry="6" fill="#ffffff" opacity="0.85" transform="rotate(-25 20 24)"/>
  <ellipse cx="44" cy="24" rx="9" ry="6" fill="#ffffff" opacity="0.85" transform="rotate(25 44 24)"/>

  <!-- Bienenkörper -->
  <g clip-path="url(#koerper)">
    <rect x="20" y="24" width="24" height="30" fill="#ffd24d"/>
    <!-- Streifen -->
    <rect x="20" y="30" width="24" height="5" fill="#3a2a15"/>
    <rect x="20" y="40" width="24" height="5" fill="#3a2a15"/>
    <rect x="20" y="50" width="24" height="6" fill="#3a2a15"/>
  </g>

  <!-- Kopf -->
  <circle cx="32" cy="22" r="7" fill="#3a2a15"/>
  <!-- Fühler -->
  <path d="M29 16 Q26 10 23 11" stroke="#3a2a15" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M35 16 Q38 10 41 11" stroke="#3a2a15" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Augen -->
  <circle cx="29.5" cy="22" r="1.4" fill="#fff"/>
  <circle cx="34.5" cy="22" r="1.4" fill="#fff"/>

  <defs>
    <clipPath id="koerper">
      <ellipse cx="32" cy="38" rx="12" ry="16"/>
    </clipPath>
    <linearGradient id="glanz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
